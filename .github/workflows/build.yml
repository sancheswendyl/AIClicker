name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleFDroidDebug

      - name: Rename APK
        run: mv smartautoclicker/build/outputs/apk/fDroid/debug/*.apk smartautoclicker/build/outputs/apk/fDroid/debug/AIClicker.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AIClicker
          path: smartautoclicker/build/outputs/apk/fDroid/debug/AIClicker.apk
